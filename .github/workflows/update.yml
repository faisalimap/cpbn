name: CPBN 20-Min Realtime Pulse

on:
  schedule:
    - cron: '*/20 * * * *' # Fires execution tasks continuously every 20 minutes
  workflow_dispatch: # Allows manual pipeline triggering from the UI dashboard

jobs:
  ingest-and-propagate:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch Repository State
        uses: actions/checkout@v4

      - name: Initialize Python Core Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Inject Cache and Dependencies
        run: pip install requests

      - name: Execute Incremental Aggregator Engine
        env:
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
        run: python fetch_news.py

      - name: Push Data and Redeploy
        run: |
          git config --global user.name "CPBN Newsroom Core"
          git config --global user.email "newsroom@cpbn.qzz.io"
          git add news.json
          git commit -m "Wire Update: Ingest Fresh Market Feeds [skip ci]" || exit 0
          git push
