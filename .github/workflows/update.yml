name: CPBN Network Auto Refresh

on:
  schedule:
    - cron: '0 4 * * *' # Fires automatically every day at 4:00 AM UTC
  workflow_dispatch: # Allows you to press a button to force update immediately

jobs:
  build-and-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Initialize Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Network Extensions
        run: pip install requests

      - name: Pull Global Wire Data
        env:
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
        run: python fetch_news.py

      - name: Commit Matrix and Push Deploy
        run: |
          git config --global user.name "ISBC Automation Bot"
          git config --global user.email "automation@isbc.org"
          git add news.json
          git commit -m "Sync Business Feed Data [skip ci]" || exit 0
          git push
